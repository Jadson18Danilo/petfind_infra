services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petfind
    ports:
      - "5433:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../petfind_backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_HOST_PORT:-4001}:4000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/petfind
      JWT_SECRET: your_secret_key_change_in_production
      FRONTEND_URLS: http://localhost:5423,http://localhost:5424,http://localhost:3000,http://127.0.0.1:5423,http://127.0.0.1:5424,http://127.0.0.1:3000
      PORT: 4000
      NODE_ENV: production
    volumes:
      - backend_uploads:/app/public/uploads
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run db:migrate && npm start"

  frontend:
    build:
      context: ../petfind_frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_HOST_PORT:-4001}
    ports:
      - "${FRONTEND_HOST_PORT:-5424}:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
    depends_on:
      - backend

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - postgres

volumes:
  postgres_data:
  backend_uploads: